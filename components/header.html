<style>
  /* Top accent frame line */
  .header__frame-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(
      to right,
      transparent 0%,
      var(--accent) 30%,
      var(--accent) 70%,
      transparent 100%
    );
    opacity: 0.4;
  }

  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-height);
    z-index: var(--z-header);
    background: hsla(0, 0%, 5%, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    transition: border-color var(--transition-base), background var(--transition-base);
  }

  .header.scrolled {
    background: hsla(0, 0%, 4%, 0.97);
    border-bottom-color: var(--border-light);
  }

  .header__inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 100%;
    gap: var(--space-6);
  }

  /* ── Logo ── */
  .header__logo {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    text-decoration: none;
    flex-shrink: 0;
  }

  /* [ SK ] bracket mark — monospaced, no background fill */
  .header__logo-mark {
    font-family: var(--font-mono);
    font-size: var(--text-sm);
    font-weight: var(--weight-bold);
    color: var(--accent);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .header__logo-divider {
    font-family: var(--font-mono);
    color: var(--border-light);
    font-size: var(--text-sm);
  }

  .header__logo-text {
    font-family: var(--font-primary);
    font-size: var(--text-sm);
    font-weight: var(--weight-medium);
    color: var(--text-secondary);
    letter-spacing: 0.01em;
  }

  .header__logo:hover .header__logo-text { color: var(--text-primary); }
  .header__logo:hover .header__logo-mark { color: var(--accent-hover); }

  /* ── Desktop Nav ── */
  .header__nav-list {
    display: flex;
    align-items: center;
    gap: var(--space-5);
    list-style: none;
    margin: 0; padding: 0;
  }

  .header__nav-link {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    font-weight: var(--weight-medium);
    letter-spacing: var(--tracking-wider);
    text-transform: uppercase;
    color: var(--text-muted);
    transition: color var(--transition-fast);
    padding-bottom: 2px;
  }

  .header__nav-link:hover,
  .header__nav-link.active {
    color: var(--text-primary);
  }

  /* Contact — the CTA chip */
  .header__nav-link--cta {
    padding: 6px var(--space-4);
    background: var(--accent-subtle);
    border: 1px solid hsla(172, 85%, 44%, 0.25);
    border-radius: var(--radius-sm);
    color: var(--accent) !important;
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    letter-spacing: var(--tracking-wider);
    text-transform: uppercase;
    transition: all var(--transition-base);
  }

  .header__nav-link--cta:hover {
    background: var(--accent);
    color: #000 !important;
    border-color: var(--accent);
  }

  /* ── Hamburger ── */
  .header__hamburger {
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
    width: 36px;
    height: 36px;
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    padding: 6px;
    transition: border-color var(--transition-fast);
  }

  .header__hamburger:hover { border-color: var(--accent); }

  .hamburger-line {
    display: block;
    width: 100%;
    height: 1px;
    background: var(--text-secondary);
    border-radius: 0; /* Brutalist */
    transition: all var(--transition-base);
    transform-origin: center;
  }

  .header__hamburger.open .hamburger-line:nth-child(1) {
    transform: translateY(6px) rotate(45deg);
  }
  .header__hamburger.open .hamburger-line:nth-child(2) {
    opacity: 0;
    transform: scaleX(0);
  }
  .header__hamburger.open .hamburger-line:nth-child(3) {
    transform: translateY(-6px) rotate(-45deg);
  }

  /* ── Mobile Menu ── */
  .mobile-menu {
    position: fixed;
    top: var(--header-height);
    left: 0; right: 0;
    background: hsla(0, 0%, 5%, 0.98);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(16px);
    padding: var(--space-6);
    transform: translateY(-8px);
    opacity: 0;
    transition: all var(--transition-base);
    pointer-events: none;
  }

  .mobile-menu:not([hidden]) {
    transform: translateY(0);
    opacity: 1;
    pointer-events: auto;
  }

  .mobile-menu__list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .mobile-menu__link {
    display: block;
    padding: var(--space-3) var(--space-4);
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    letter-spacing: var(--tracking-wider);
    text-transform: uppercase;
    border-radius: var(--radius-sm);
    transition: all var(--transition-fast);
    border-left: 2px solid transparent;
  }

  .mobile-menu__link:hover,
  .mobile-menu__link.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: var(--accent-subtle);
  }

  .mobile-menu__link--cta {
    margin-top: var(--space-4);
    background: var(--accent);
    color: #000 !important;
    border-left-color: transparent !important;
    text-align: center;
    font-weight: var(--weight-bold);
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .header__nav    { display: none; }
    .header__hamburger { display: flex; }
    .header__logo-text { display: none; } /* Just show [ SK ] on mobile */
  }
</style>
