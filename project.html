<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Meta tags are updated dynamically below using setPageMeta() -->
  <meta name="description" content="Project detail — Stephen's Portfolio" />
  <title>Project — Stephen</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/animations.css" />
  <link rel="stylesheet" href="/css/pages/projects.css" />
</head>
<body>

  <div id="header"></div>

  <main class="page-content">
    <div class="container">

      <!--
        This entire page is populated by JavaScript.
        The URL must contain ?id=<project-id>
        e.g. /project.html?id=smart-health-ai
        
        JS reads the id, finds the matching project in projects.json,
        and renders all the content below.
      -->

      <!-- Loading state -->
      <div id="project-loader" style="padding:var(--space-20) 0">
        <div class="spinner"></div>
      </div>

      <!-- Error state (shown if id not found) -->
      <div id="project-error" hidden style="padding:var(--space-20) 0;text-align:center">
        <p style="font-size:var(--text-4xl);margin-bottom:var(--space-4)">🔍</p>
        <h2 style="margin-bottom:var(--space-4)">Project Not Found</h2>
        <p style="color:var(--text-secondary);margin-bottom:var(--space-8)">
          The project you're looking for doesn't exist or the URL is incorrect.
        </p>
        <a href="/projects.html" class="btn btn-primary">← Back to Projects</a>
      </div>

      <!-- Project content (populated by JS) -->
      <div id="project-content" hidden></div>

    </div>
  </main>

  <div id="footer"></div>

  <script src="/js/main.js" defer></script>
  <script src="/js/animations.js" defer></script>

  <script defer>
    document.addEventListener('DOMContentLoaded', async () => {

      // ── Read the project ID from the URL query string ──
      // e.g. /project.html?id=smart-health-ai → id = "smart-health-ai"
      const params    = new URLSearchParams(window.location.search);
      const projectId = params.get('id');

      const loader        = document.getElementById('project-loader');
      const errorEl       = document.getElementById('project-error');
      const contentEl     = document.getElementById('project-content');

      // If no id in URL, show error immediately
      if (!projectId) {
        loader.hidden = true;
        errorEl.hidden = false;
        return;
      }

      try {
        const res      = await fetch('/data/projects.json');
        const projects = await res.json();

        // Find the project whose id matches the URL param
        const project = projects.find(p => p.id === projectId);

        if (!project) {
          loader.hidden = true;
          errorEl.hidden = false;
          return;
        }

        // ── Update SEO meta tags for this specific project ──
        if (window.setPageMeta) {
          window.setPageMeta({
            title: `${project.title} — Stephen`,
            description: project.tagline,
          });
        }

        // ── Render the project detail page ──
        contentEl.innerHTML = `
          <!-- Back navigation -->
          <div class="project-detail__hero">
            <a href="/projects.html" class="project-detail__back">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
              Back to Projects
            </a>

            <!-- Category & Tech badges -->
            <div class="tags" style="margin-bottom:var(--space-4)">
              ${project.categories.map(c => `<span class="tag">${c}</span>`).join('')}
            </div>

            <h1 class="project-detail__title">${project.title}</h1>
            <p class="project-detail__tagline">${project.tagline}</p>

            <!-- Project image or emoji placeholder -->
            <div class="project-detail__image-placeholder" aria-hidden="true">
              <span>${project.emoji || '💻'}</span>
            </div>
          </div>

          <!-- Two-column layout: body content + sidebar -->
          <div class="project-detail__layout">

            <!-- Main content -->
            <div class="project-detail__body reveal">
              <h2>About This Project</h2>
              ${project.description.split('\n\n').map(para => `<p>${para.trim()}</p>`).join('')}

              <h2>Key Highlights</h2>
              <ul class="project-detail__highlights">
                ${project.highlights.map(h => `<li>${h}</li>`).join('')}
              </ul>
            </div>

            <!-- Sidebar -->
            <aside class="project-detail__sidebar reveal">
              <div class="project-detail__sidebar-card">

                <div class="sidebar-section">
                  <div class="sidebar-section__title">Technologies</div>
                  <div class="tags">
                    ${project.technologies.map(t => `<span class="tag">${t}</span>`).join('')}
                  </div>
                </div>

                <div class="sidebar-section">
                  <div class="sidebar-section__title">Date</div>
                  <p style="font-size:var(--text-sm);color:var(--text-secondary);font-family:var(--font-mono)">
                    ${project.date}
                  </p>
                </div>

                ${project.links.github || project.links.live ? `
                <div class="sidebar-section">
                  <div class="sidebar-section__title">Links</div>
                  <div style="display:flex;flex-direction:column;gap:var(--space-2)">
                    ${project.links.github ? `
                    <a href="${project.links.github}" target="_blank" rel="noopener" class="btn btn-ghost" style="width:100%;justify-content:center">
                      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
                      View on GitHub
                    </a>` : ''}
                    ${project.links.live ? `
                    <a href="${project.links.live}" target="_blank" rel="noopener" class="btn btn-primary" style="width:100%;justify-content:center">
                      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></svg>
                      Live Demo
                    </a>` : ''}
                  </div>
                </div>` : ''}

              </div>
            </aside>

          </div>

          <!-- Back link at bottom -->
          <div style="margin-top:var(--space-16);padding-top:var(--space-8);border-top:1px solid var(--border)">
            <a href="/projects.html" class="btn btn-ghost">
              ← Back to All Projects
            </a>
          </div>
        `;

        loader.hidden  = true;
        contentEl.hidden = false;

      } catch (err) {
        console.error('Could not load project:', err);
        loader.hidden  = true;
        errorEl.hidden = false;
      }

    });
  </script>

</body>
</html>
